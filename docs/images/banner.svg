<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA07A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Cat silhouette with headphones/mic -->
  <g transform="translate(85, 65)">
    <!-- Cat ears -->
    <path d="M-22,-30 L-14,-10 L-30,-10 Z" fill="url(#accent)" opacity="0.85"/>
    <path d="M22,-30 L14,-10 L30,-10 Z" fill="url(#accent)" opacity="0.85"/>
    <!-- Cat head -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.85"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-4" r="3" fill="#FFA07A" opacity="0.7"/>
    <circle cx="8" cy="-4" r="3" fill="#FFA07A" opacity="0.7"/>
    <!-- Whiskers -->
    <line x1="-24" y1="4" x2="-14" y2="2" stroke="#FFA07A" stroke-width="1" opacity="0.4"/>
    <line x1="-24" y1="8" x2="-14" y2="6" stroke="#FFA07A" stroke-width="1" opacity="0.4"/>
    <line x1="24" y1="4" x2="14" y2="2" stroke="#FFA07A" stroke-width="1" opacity="0.4"/>
    <line x1="24" y1="8" x2="14" y2="6" stroke="#FFA07A" stroke-width="1" opacity="0.4"/>
    <!-- Headphone band -->
    <path d="M-26,-6 C-28,-22 28,-22 26,-6" fill="none" stroke="#FFA07A" stroke-width="2.5" opacity="0.6"/>
    <!-- Headphone cups -->
    <rect x="-32" y="-10" width="8" height="14" rx="3" fill="#FFA07A" opacity="0.5"/>
    <rect x="24" y="-10" width="8" height="14" rx="3" fill="#FFA07A" opacity="0.5"/>
    <!-- Microphone -->
    <line x1="24" y1="6" x2="34" y2="20" stroke="#FFA07A" stroke-width="2" opacity="0.5"/>
    <circle cx="36" cy="22" r="4" fill="none" stroke="#FFA07A" stroke-width="1.5" opacity="0.5"/>
    <!-- Sound waves from mic -->
    <path d="M42,18 C46,16 46,28 42,26" fill="none" stroke="#FFA07A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <path d="M47,15 C53,12 53,32 47,29" fill="none" stroke="#FFA07A" stroke-width="1.2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    CatsUp
  </text>

  <!-- Subtitle -->
  <text x="202" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#FFA07A" letter-spacing="0.5">
    AI-powered meeting assistant that runs locally
  </text>

  <!-- Decorative: waveform on right -->
  <g transform="translate(700, 60)" opacity="0.15">
    <rect x="0" y="30" width="6" height="40" rx="3" fill="#ffffff"/>
    <rect x="14" y="15" width="6" height="70" rx="3" fill="#ffffff"/>
    <rect x="28" y="25" width="6" height="50" rx="3" fill="#ffffff"/>
    <rect x="42" y="10" width="6" height="80" rx="3" fill="#ffffff"/>
    <rect x="56" y="20" width="6" height="60" rx="3" fill="#ffffff"/>
    <rect x="70" y="30" width="6" height="40" rx="3" fill="#ffffff"/>
    <rect x="84" y="35" width="6" height="30" rx="3" fill="#ffffff"/>
    <rect x="98" y="25" width="6" height="50" rx="3" fill="#ffffff"/>
    <rect x="112" y="15" width="6" height="70" rx="3" fill="#ffffff"/>
    <rect x="126" y="30" width="6" height="40" rx="3" fill="#ffffff"/>
    <rect x="140" y="40" width="6" height="20" rx="3" fill="#ffffff"/>
  </g>
</svg>
