name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore platform/windows/CatsUp.Windows.csproj

      - name: Publish
        run: dotnet publish platform/windows/CatsUp.Windows.csproj -c Release -o dist/windows --self-contained -r win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: catsup-windows
          path: dist/windows/

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: platform/macos
        run: |
          swift build -c release
          mkdir -p ../../dist/macos
          cp -R .build/release/CatsUp ../../dist/macos/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: catsup-macos
          path: dist/macos/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: platform/linux
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        working-directory: platform/linux
        run: |
          pyinstaller --onefile --name catsup main.py
          mkdir -p ../../dist/linux
          cp dist/catsup ../../dist/linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: catsup-linux
          path: dist/linux/

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: catsup-ui
          path: ui/dist/

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux, build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release
          
          # Windows
          cd artifacts/catsup-windows
          zip -r "../../release/CatsUp-${VERSION}-windows-x64.zip" .
          cd ../..
          
          # macOS
          cd artifacts/catsup-macos
          tar -czvf "../../release/CatsUp-${VERSION}-macos.tar.gz" .
          cd ../..
          
          # Linux
          cd artifacts/catsup-linux
          tar -czvf "../../release/CatsUp-${VERSION}-linux-x64.tar.gz" .
          cd ../..

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | sed -n '2p')
          
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          {
            echo "## What's Changed"
            echo ""
            
            FEATURES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES" | head -20
              echo ""
            fi
            
            FIXES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | head -20
              echo ""
            fi
            
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$VERSION"
          } > changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "CatsUp v${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          files: |
            release/CatsUp-${{ steps.version.outputs.version }}-windows-x64.zip
            release/CatsUp-${{ steps.version.outputs.version }}-macos.tar.gz
            release/CatsUp-${{ steps.version.outputs.version }}-linux-x64.tar.gz
