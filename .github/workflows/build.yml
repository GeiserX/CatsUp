name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-core:
    name: Core TypeScript Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: tests
      run: npm ci
    - name: Run tests
      working-directory: tests
      run: npm test

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore platform/windows/CatsUp.Windows.csproj
    - name: Build
      run: dotnet build platform/windows/CatsUp.Windows.csproj --no-restore
    - name: Test
      run: dotnet test tests/CatsUp.Tests.csproj --no-build --verbosity normal
      continue-on-error: true

  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      working-directory: platform/macos
      run: swift build -v
    - name: Test
      working-directory: platform/macos
      run: swift test -v
      continue-on-error: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      working-directory: platform/linux
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    - name: Test
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/test_linux.py
      continue-on-error: true

  build-ui:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: ui
      run: npm ci
    - name: Build
      working-directory: ui
      run: npm run build
