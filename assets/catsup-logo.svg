<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="catGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Cat body - sitting upward pose -->
  <g transform="translate(256, 280)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="85" ry="100" fill="url(#catGradient)"/>
    
    <!-- Head -->
    <circle cx="0" cy="-60" r="75" fill="url(#catGradient)"/>
    
    <!-- Left ear -->
    <path d="M-55 -110 L-75 -180 L-30 -130 Z" fill="url(#catGradient)"/>
    <path d="M-52 -115 L-68 -165 L-35 -128 Z" fill="url(#accentGradient)" opacity="0.6"/>
    
    <!-- Right ear -->
    <path d="M55 -110 L75 -180 L30 -130 Z" fill="url(#catGradient)"/>
    <path d="M52 -115 L68 -165 L35 -128 Z" fill="url(#accentGradient)" opacity="0.6"/>
    
    <!-- Eyes - looking up -->
    <ellipse cx="-28" cy="-70" rx="18" ry="22" fill="white"/>
    <ellipse cx="28" cy="-70" rx="18" ry="22" fill="white"/>
    
    <!-- Pupils - looking up -->
    <ellipse cx="-28" cy="-78" rx="10" ry="14" fill="#1E1B4B"/>
    <ellipse cx="28" cy="-78" rx="10" ry="14" fill="#1E1B4B"/>
    
    <!-- Eye shine -->
    <circle cx="-32" cy="-84" r="4" fill="white"/>
    <circle cx="24" cy="-84" r="4" fill="white"/>
    
    <!-- Nose -->
    <path d="M0 -48 L-8 -38 L8 -38 Z" fill="#E879F9"/>
    
    <!-- Mouth -->
    <path d="M0 -38 Q-12 -28 -18 -34" stroke="#E879F9" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 -38 Q12 -28 18 -34" stroke="#E879F9" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <line x1="-30" y1="-42" x2="-70" y2="-52" stroke="white" stroke-width="2" opacity="0.8"/>
    <line x1="-32" y1="-36" x2="-72" y2="-36" stroke="white" stroke-width="2" opacity="0.8"/>
    <line x1="-30" y1="-30" x2="-70" y2="-20" stroke="white" stroke-width="2" opacity="0.8"/>
    
    <line x1="30" y1="-42" x2="70" y2="-52" stroke="white" stroke-width="2" opacity="0.8"/>
    <line x1="32" y1="-36" x2="72" y2="-36" stroke="white" stroke-width="2" opacity="0.8"/>
    <line x1="30" y1="-30" x2="70" y2="-20" stroke="white" stroke-width="2" opacity="0.8"/>
    
    <!-- Front paws -->
    <ellipse cx="-45" cy="140" rx="25" ry="18" fill="url(#catGradient)"/>
    <ellipse cx="45" cy="140" rx="25" ry="18" fill="url(#catGradient)"/>
    
    <!-- Tail curving up -->
    <path d="M70 100 Q120 80 130 20 Q135 -20 110 -40" 
          stroke="url(#catGradient)" stroke-width="28" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Sparkle/AI indicator (top right) -->
  <g transform="translate(420, 80)">
    <path d="M0 -20 L4 -4 L20 0 L4 4 L0 20 L-4 4 L-20 0 L-4 -4 Z" fill="#E879F9"/>
  </g>
  <g transform="translate(380, 120)" opacity="0.7">
    <path d="M0 -12 L2 -2 L12 0 L2 2 L0 12 L-2 2 L-12 0 L-2 -2 Z" fill="#A855F7"/>
  </g>
</svg>

