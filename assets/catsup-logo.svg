<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="catGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730A3"/>
      <stop offset="100%" style="stop-color:#5B21B6"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  
  <!-- Elegant sitting cat silhouette -->
  <g transform="translate(256, 275)">
    
    <!-- Back body curve (sitting pose) -->
    <path d="
      M-75 80
      C-95 60 -100 20 -90 -20
      C-85 -45 -70 -65 -50 -75
      C-30 -85 -10 -90 10 -90
      C40 -90 65 -80 85 -60
      C95 -48 100 -30 95 -10
      C90 20 75 50 60 75
      C45 95 20 110 -10 115
      C-40 118 -65 100 -75 80
      Z
    " fill="url(#catGradient)"/>
    
    <!-- Inner body shadow for depth -->
    <path d="
      M-60 70
      C-75 55 -80 25 -72 -10
      C-68 -30 -55 -50 -35 -60
      C-15 -70 10 -72 35 -65
      C55 -58 70 -45 78 -25
      C85 -5 82 20 72 45
      C62 70 45 85 20 92
      C-5 98 -45 85 -60 70
      Z
    " fill="url(#shadowGradient)" opacity="0.3"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-130" rx="68" ry="62" fill="url(#catGradient)"/>
    
    <!-- Head highlight -->
    <ellipse cx="-15" cy="-145" rx="35" ry="28" fill="url(#highlightGradient)" opacity="0.15"/>
    
    <!-- Left ear - elegant triangular -->
    <path d="
      M-48 -165
      Q-52 -210 -65 -235
      Q-68 -242 -62 -240
      Q-35 -225 -25 -185
      Q-22 -170 -35 -165
      Z
    " fill="url(#catGradient)"/>
    
    <!-- Left ear inner -->
    <path d="
      M-45 -170
      Q-48 -200 -58 -220
      Q-42 -210 -35 -180
      Z
    " fill="url(#shadowGradient)" opacity="0.5"/>
    
    <!-- Right ear - elegant triangular -->
    <path d="
      M48 -165
      Q52 -210 65 -235
      Q68 -242 62 -240
      Q35 -225 25 -185
      Q22 -170 35 -165
      Z
    " fill="url(#catGradient)"/>
    
    <!-- Right ear inner -->
    <path d="
      M45 -170
      Q48 -200 58 -220
      Q42 -210 35 -180
      Z
    " fill="url(#shadowGradient)" opacity="0.5"/>
    
    <!-- Left eye - almond shaped, elegant -->
    <ellipse cx="-24" cy="-135" rx="14" ry="17" fill="#1E1B4B"/>
    <ellipse cx="-24" cy="-135" rx="12" ry="15" fill="#312E81"/>
    
    <!-- Left eye pupil (vertical slit) -->
    <ellipse cx="-24" cy="-135" rx="4" ry="12" fill="#1E1B4B"/>
    
    <!-- Left eye shine -->
    <circle cx="-28" cy="-140" r="4" fill="white" opacity="0.9"/>
    <circle cx="-20" cy="-132" r="2" fill="white" opacity="0.5"/>
    
    <!-- Right eye - almond shaped, elegant -->
    <ellipse cx="24" cy="-135" rx="14" ry="17" fill="#1E1B4B"/>
    <ellipse cx="24" cy="-135" rx="12" ry="15" fill="#312E81"/>
    
    <!-- Right eye pupil (vertical slit) -->
    <ellipse cx="24" cy="-135" rx="4" ry="12" fill="#1E1B4B"/>
    
    <!-- Right eye shine -->
    <circle cx="20" cy="-140" r="4" fill="white" opacity="0.9"/>
    <circle cx="28" cy="-132" r="2" fill="white" opacity="0.5"/>
    
    <!-- Nose - small elegant triangle -->
    <path d="
      M0 -112
      L-7 -100
      Q0 -97 7 -100
      Z
    " fill="#DB2777"/>
    
    <!-- Nose highlight -->
    <ellipse cx="-2" cy="-108" rx="2" ry="3" fill="#F472B6" opacity="0.5"/>
    
    <!-- Mouth - subtle elegant curve -->
    <path d="M0 -100 Q-10 -92 -15 -96" stroke="#9D174D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0 -100 Q10 -92 15 -96" stroke="#9D174D" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Whiskers - elegant thin lines -->
    <g stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <!-- Left whiskers -->
      <line x1="-30" y1="-108" x2="-75" y2="-118"/>
      <line x1="-32" y1="-102" x2="-78" y2="-102"/>
      <line x1="-30" y1="-96" x2="-75" y2="-86"/>
      
      <!-- Right whiskers -->
      <line x1="30" y1="-108" x2="75" y2="-118"/>
      <line x1="32" y1="-102" x2="78" y2="-102"/>
      <line x1="30" y1="-96" x2="75" y2="-86"/>
    </g>
    
    <!-- Front left paw -->
    <ellipse cx="-45" cy="115" rx="22" ry="15" fill="url(#catGradient)"/>
    <path d="M-55 108 Q-58 102 -52 102 Q-48 102 -50 108" fill="url(#shadowGradient)" opacity="0.3"/>
    <path d="M-45 108 Q-48 102 -42 102 Q-38 102 -40 108" fill="url(#shadowGradient)" opacity="0.3"/>
    <path d="M-35 108 Q-38 102 -32 102 Q-28 102 -30 108" fill="url(#shadowGradient)" opacity="0.3"/>
    
    <!-- Front right paw -->
    <ellipse cx="45" cy="115" rx="22" ry="15" fill="url(#catGradient)"/>
    <path d="M35 108 Q32 102 38 102 Q42 102 40 108" fill="url(#shadowGradient)" opacity="0.3"/>
    <path d="M45 108 Q42 102 48 102 Q52 102 50 108" fill="url(#shadowGradient)" opacity="0.3"/>
    <path d="M55 108 Q52 102 58 102 Q62 102 60 108" fill="url(#shadowGradient)" opacity="0.3"/>
    
    <!-- Chest fur detail -->
    <path d="
      M-25 20
      Q-30 40 -20 60
      Q-10 75 0 75
      Q10 75 20 60
      Q30 40 25 20
      Q15 35 0 35
      Q-15 35 -25 20
      Z
    " fill="url(#highlightGradient)" opacity="0.2"/>
    
  </g>
  
  <!-- ARROW TAIL - pointing up (the signature element) -->
  <g transform="translate(380, 200)">
    <!-- Tail stem/body curving from cat to arrow -->
    <path d="
      M-30 120
      Q-15 100 0 70
      Q10 45 15 20
      L15 -30
    " stroke="url(#arrowGradient)" stroke-width="24" fill="none" stroke-linecap="round"/>
    
    <!-- Arrow head pointing UP -->
    <path d="
      M15 -25
      L-25 25
      L0 25
      L0 45
      L30 45
      L30 25
      L55 25
      Z
    " fill="url(#arrowGradient)"/>
    
    <!-- Arrow head highlight -->
    <path d="
      M15 -20
      L-15 18
      L5 18
      L5 35
      L25 35
      L25 18
      L45 18
      Z
    " fill="url(#highlightGradient)" opacity="0.25"/>
  </g>
  
  <!-- Subtle glow behind arrow -->
  <circle cx="395" cy="175" r="45" fill="url(#arrowGradient)" opacity="0.15"/>
  
</svg>
