<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Simplified cat icon for menu bar -->
  <g transform="translate(32, 36)">
    <!-- Head -->
    <circle cx="0" cy="0" r="20" fill="url(#catGrad)"/>
    
    <!-- Left ear -->
    <path d="M-14 -14 L-20 -28 L-6 -18 Z" fill="url(#catGrad)"/>
    
    <!-- Right ear -->
    <path d="M14 -14 L20 -28 L6 -18 Z" fill="url(#catGrad)"/>
    
    <!-- Eyes - looking up -->
    <ellipse cx="-7" cy="-3" rx="4" ry="5" fill="white"/>
    <ellipse cx="7" cy="-3" rx="4" ry="5" fill="white"/>
    
    <!-- Pupils -->
    <ellipse cx="-7" cy="-5" rx="2.5" ry="3.5" fill="#1E1B4B"/>
    <ellipse cx="7" cy="-5" rx="2.5" ry="3.5" fill="#1E1B4B"/>
    
    <!-- Nose -->
    <path d="M0 3 L-2 6 L2 6 Z" fill="#E879F9"/>
    
    <!-- Tail going up -->
    <path d="M16 12 Q26 8 28 -4 Q29 -12 22 -16" 
          stroke="url(#catGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>

