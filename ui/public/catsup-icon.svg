<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  
  <!-- Elegant cat head -->
  <g transform="translate(26, 38)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="18" ry="16" fill="url(#catGrad)"/>
    
    <!-- Left ear -->
    <path d="M-12 -10 Q-14 -24 -18 -30 Q-10 -24 -6 -14 Z" fill="url(#catGrad)"/>
    
    <!-- Right ear -->
    <path d="M12 -10 Q14 -24 18 -30 Q10 -24 6 -14 Z" fill="url(#catGrad)"/>
    
    <!-- Left ear inner -->
    <path d="M-10 -12 Q-12 -20 -15 -24 Q-9 -20 -7 -14 Z" fill="#5B21B6" opacity="0.5"/>
    
    <!-- Right ear inner -->
    <path d="M10 -12 Q12 -20 15 -24 Q9 -20 7 -14 Z" fill="#5B21B6" opacity="0.5"/>
    
    <!-- Eyes - elegant almond -->
    <ellipse cx="-6" cy="-2" rx="4" ry="5" fill="#1E1B4B"/>
    <ellipse cx="6" cy="-2" rx="4" ry="5" fill="#1E1B4B"/>
    
    <!-- Pupils -->
    <ellipse cx="-6" cy="-2" rx="1.5" ry="4" fill="#312E81"/>
    <ellipse cx="6" cy="-2" rx="1.5" ry="4" fill="#312E81"/>
    
    <!-- Eye shine -->
    <circle cx="-7.5" cy="-4" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="4.5" cy="-4" r="1.5" fill="white" opacity="0.9"/>
    
    <!-- Nose -->
    <path d="M0 4 L-2 7 L2 7 Z" fill="#DB2777"/>
    
    <!-- Whiskers -->
    <g stroke="#C4B5FD" stroke-width="0.8" opacity="0.6">
      <line x1="-8" y1="3" x2="-18" y2="1"/>
      <line x1="-8" y1="5" x2="-18" y2="5"/>
      <line x1="8" y1="3" x2="18" y2="1"/>
      <line x1="8" y1="5" x2="18" y2="5"/>
    </g>
  </g>
  
  <!-- Arrow tail pointing up -->
  <g transform="translate(48, 24)">
    <!-- Tail stem -->
    <path d="M-8 22 Q-4 15 0 8 L0 -4" stroke="url(#arrowGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Arrow head -->
    <path d="M0 -4 L-8 6 L-3 6 L-3 10 L3 10 L3 6 L8 6 Z" fill="url(#arrowGrad)"/>
  </g>
</svg>
